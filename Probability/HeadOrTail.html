<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss Simulator Pro</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --head-color: #f59e0b;
            --tail-color: #6366f1;
            --bar-bg: #e5e7eb;
        }

        /* Tool specific layout overrides */
        .tool-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            text-align: center;
            margin: 0 auto;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .action-btn {
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Results Display */
        .results-section {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat-card {
            padding: 1.25rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-card.head {
            background: #fef3c7;
            color: #92400e;
        }

        .stat-card.tail {
            background: #e0e7ff;
            color: #3730a3;
        }

        .stat-card .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 800;
        }

        .stat-card .percent {
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.8;
        }

        /* Ratio Bar */
        .ratio-container {
            width: 100%;
            height: 24px;
            background: var(--bar-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
        }

        .bar-segment {
            height: 100%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-segment.head {
            background: var(--head-color);
        }

        .bar-segment.tail {
            background: var(--tail-color);
        }

        .total-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <header class="mobile-header">
        <a href="../index.html" class="mobile-logo">
            <i data-lucide="bar-chart-3"></i>
            <span>Data Visualiser</span>
        </a>
        <button class="hamburger" onclick="toggleMobileSidebar()">
            <i data-lucide="menu"></i>
        </button>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo">
                <i data-lucide="bar-chart-3"></i>
                <span class="sidebar-text">Data Visualiser</span>
            </a>
            <button class="toggle-btn" id="toggle-btn" onclick="toggleSidebar()">
                <i data-lucide="chevron-left" id="toggle-icon"></i>
            </button>
        </div>

        <div class="nav-container">
            <div class="nav-section">
                <h3 class="section-title">Mathematics</h3>
                <a href="../index.html" class="nav-link">
                    <i data-lucide="home"></i>
                    <span class="sidebar-text">Dashboard</span>
                </a>
            </div>

            <div class="nav-section">
                <h3 class="section-title">Probability</h3>
                <a href="HeadOrTail.html" class="nav-link active">
                    <i data-lucide="coins"></i>
                    <span class="sidebar-text">Coin Toss</span>
                </a>
                <a href="MultiCoin.html" class="nav-link">
                    <i data-lucide="layers"></i>
                    <span class="sidebar-text">Multi-Coin Space</span>
                </a>
            </div>

            <div class="nav-section">
                <h3 class="section-title">Set Theory</h3>
                <a href="../Set Theory/2ElementVenn.html" class="nav-link">
                    <i data-lucide="circle-dot"></i>
                    <span class="sidebar-text">2-Element Venn</span>
                </a>
                <a href="../Set Theory/3ElementVenn.html" class="nav-link">
                    <i data-lucide="layout-grid"></i>
                    <span class="sidebar-text">3-Element Venn</span>
                </a>
            </div>

            <div class="nav-section">
                <h3 class="section-title">Data Description</h3>
                <a href="../Data Description/BarChart.html" class="nav-link">
                    <i data-lucide="bar-chart-3"></i>
                    <span class="sidebar-text">Bar Chart</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="tool-container">
            <header>
                <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Coin Toss Simulator Pro</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Simulate thousands of tosses in an instant
                </p>
            </header>

            <div class="input-section">
                <div class="input-group">
                    <label for="numberOfTimesTossed">Number of Tosses (n)</label>
                    <input type="number" id="numberOfTimesTossed" min="1" max="100000" value="100">
                </div>

                <button class="action-btn" onclick="simulate()">Simulate Now</button>
            </div>

            <div id="resultsSection" class="results-section">
                <div class="stats-grid">
                    <div class="stat-card head">
                        <span class="label">Heads</span>
                        <span id="headCount" class="value">0</span>
                        <span id="headPercent" class="percent">0%</span>
                    </div>
                    <div class="stat-card tail">
                        <span class="label">Tails</span>
                        <span id="tailCount" class="value">0</span>
                        <span id="tailPercent" class="percent">0%</span>
                    </div>
                </div>

                <div class="ratio-container">
                    <div id="headBar" class="bar-segment head" style="width: 50%;"></div>
                    <div id="tailBar" class="bar-segment tail" style="width: 50%;"></div>
                </div>

                <div class="total-info">
                    Total simulated tosses: <span id="totalDisplay">0</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('collapsed');

            if (sidebar.classList.contains('collapsed')) {
                icon.setAttribute('data-lucide', 'chevron-right');
            } else {
                icon.setAttribute('data-lucide', 'chevron-left');
            }
            lucide.createIcons();
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function simulate() {
            const input = document.getElementById('numberOfTimesTossed');
            const n = parseInt(input.value) || 0;

            if (n <= 0) {
                alert("Please enter a positive number of tosses.");
                return;
            }

            let heads = 0;
            let tails = 0;

            for (let i = 0; i < n; i++) {
                if (Math.random() < 0.5) heads++;
                else tails++;
            }

            const headPct = ((heads / n) * 100).toFixed(1);
            const tailPct = (100 - headPct).toFixed(1);

            document.getElementById('resultsSection').style.display = 'flex';
            document.getElementById('headCount').innerText = heads.toLocaleString();
            document.getElementById('tailCount').innerText = tails.toLocaleString();
            document.getElementById('headPercent').innerText = headPct + '%';
            document.getElementById('tailPercent').innerText = tailPct + '%';
            document.getElementById('totalDisplay').innerText = n.toLocaleString();

            document.getElementById('headBar').style.width = headPct + '%';
            document.getElementById('tailBar').style.width = tailPct + '%';
        }
    </script>
</body>

</html>
